<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方壺山道場 — 網站測試回饋</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:linear-gradient(160deg,#f7f0e3,#ede3d0,#e6d8c1);min-height:100vh;color:#3d3225}
.serif{font-family:'Noto Serif TC',serif}
/* Gate */
.gate-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.gate-card{width:100%;max-width:400px;padding:40px 32px;border-radius:20px;background:rgba(255,255,255,.75);backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(91,58,31,.08);border:1px solid rgba(255,255,255,.6);text-align:center}
.gate-card h1{font-size:22px;color:#5B3A1F}
.gate-card .icon{font-size:40px;margin-bottom:8px}
.gate-card .sub{margin:6px 0 24px;font-size:14px;color:#9a8a6e}
.gate-input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid rgba(0,0,0,.12);font-size:16px;background:rgba(255,255,255,.8);outline:none;text-align:center;letter-spacing:3px;font-family:monospace;transition:border-color .2s}
.gate-input.error{border-color:#c44028}
.gate-err{margin:8px 0 0;font-size:13px;color:#c44028}
.btn-primary{width:100%;margin-top:16px;padding:12px 0;border-radius:12px;background:linear-gradient(135deg,#8B5A2B,#A67B5B);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;letter-spacing:1px}
.btn-primary:disabled{background:#d5cfc3;cursor:default}
.hint{margin-top:16px;font-size:12px;color:#b8ad9c;text-align:center}
/* Welcome */
.welcome-card{width:100%;max-width:480px;padding:40px 32px;border-radius:20px;background:rgba(255,255,255,.75);backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(91,58,31,.08);border:1px solid rgba(255,255,255,.6)}
.field-label{font-size:13px;font-weight:600;color:#6B4E2E;display:block;margin-bottom:6px}
.field-input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.12);font-size:14px;background:rgba(255,255,255,.8);outline:none}
.chip-group{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 16px;border-radius:20px;border:2px solid rgba(0,0,0,.1);background:transparent;color:#6b5830;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.chip.active{border-color:#8B5A2B;background:#8B5A2B;color:#fff}
/* Header */
.topbar{position:sticky;top:0;z-index:100;padding:10px 16px;background:rgba(247,240,227,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;gap:12px}
.topbar .logo{font-size:18px}
.topbar .title{font-size:14px;font-weight:700;color:#5B3A1F}
.topbar .spacer{flex:1}
.save-indicator{font-size:11px}
.progress-badge{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:700}
/* Layout */
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:240px;min-width:240px;border-right:1px solid rgba(0,0,0,.06);background:rgba(255,255,255,.4);overflow-y:auto;padding:8px 6px}
.sidebar-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;background:transparent;border:none;border-radius:10px;cursor:pointer;text-align:left;width:100%;border-left:3px solid transparent;margin-bottom:4px;transition:all .15s}
.sidebar-btn.active{background:rgba(139,90,43,.1);border-left-color:#8B5A2B}
.sidebar-btn .label{font-size:13px;font-weight:600;color:#7a6a55}
.sidebar-btn.active .label{color:#5B3A1F}
.sidebar-btn .count{font-size:11px;color:#a09880}
.main{flex:1;overflow-y:auto;padding:24px 20px 60px;max-width:800px;margin:0 auto;width:100%}
/* Part */
.part-header{margin-bottom:24px}
.part-title{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.part-title .icon{font-size:28px}
.part-title h2{font-size:20px;color:#5B3A1F}
.part-desc{padding:12px 16px;border-radius:10px;background:rgba(255,249,230,.8);border:1px solid rgba(212,160,23,.2);font-size:13px;color:#6b5830;line-height:1.7;white-space:pre-line;margin-top:8px}
.section-title{font-size:15px;color:#6B4E2E;border-left:3px solid #C89B7B;padding-left:10px;margin:0 0 6px}
.section-note{margin:0 0 10px;font-size:12.5px;color:#9a8a6e;line-height:1.6;padding-left:14px}
/* Item */
.item{padding:14px 16px;border-radius:10px;background:rgba(255,255,255,.5);border:1px solid rgba(0,0,0,.06);transition:all .2s;margin-bottom:8px}
.item.weird{background:rgba(196,144,0,.07);border-color:rgba(196,144,0,.25)}
.item.confused{background:rgba(160,85,32,.07);border-color:rgba(160,85,32,.2)}
.item-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.item-id{font-size:12px;color:#9a8a6e;font-weight:700;min-width:36px;padding-top:2px;font-family:monospace}
.item-text{flex:1;min-width:200px;font-size:14px;line-height:1.6}
.status-chips{display:flex;gap:6px;flex-wrap:wrap}
.status-chip{padding:6px 14px;border-radius:20px;border:2px solid;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.comment-toggle{background:none;border:none;cursor:pointer;font-size:12px;color:#a09880;display:flex;align-items:center;gap:4px;padding:2px 0;margin-top:8px}
.comment-toggle.has{color:#8B5A2B}
.comment-box{width:100%;margin-top:6px;padding:10px;border-radius:8px;font-size:13px;border:1px solid rgba(0,0,0,.1);background:rgba(255,255,255,.8);resize:vertical;min-height:60px;font-family:inherit;line-height:1.5;outline:none}
/* Freeform */
.freeform-area{width:100%;padding:12px;border-radius:10px;font-size:14px;border:1px solid rgba(0,0,0,.1);background:rgba(255,255,255,.7);resize:vertical;min-height:90px;font-family:inherit;line-height:1.6;outline:none}
/* Nav */
.nav-bottom{display:flex;justify-content:space-between;margin-top:32px;padding-top:20px;border-top:1px solid rgba(0,0,0,.08)}
.btn-prev{padding:10px 20px;border-radius:10px;background:rgba(255,255,255,.6);border:1px solid rgba(0,0,0,.1);cursor:pointer;font-size:13px;color:#6b5830}
.btn-next{padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,#8B5A2B,#A67B5B);border:none;cursor:pointer;font-size:13px;color:#fff;font-weight:600}
.btn-submit{padding:10px 24px;border-radius:10px;background:linear-gradient(135deg,#6B8E4E,#8aad6a);border:none;cursor:pointer;font-size:14px;color:#fff;font-weight:700}
/* Mobile */
.mobile-toggle{display:none;background:none;border:none;cursor:pointer;font-size:20px;color:#8B5A2B;padding:4px}
.mobile-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,.3);backdrop-filter:blur(4px)}
.mobile-nav{width:280px;height:100%;background:rgba(247,240,227,.98);overflow-y:auto;padding:60px 10px 20px;box-shadow:4px 0 20px rgba(0,0,0,.1)}
@media(max-width:767px){
  .sidebar{display:none}
  .mobile-toggle{display:block}
  .mobile-overlay.open{display:block}
}
/* Ring */
.ring{transform:rotate(-90deg)}
</style>

      {title:"7.2　會員管理",note:"確認前台會員在後台看得到。",items:[
        {id:"7.2.1",text:"前台新會員出現在清單"},
        {id:"7.2.2",text:"會員詳細資料完整"},
        {id:"7.2.3",text:"DC 會員有 DC 標記"},
        {id:"7.2.4",text:"前台改資料後台同步"},
      ]},
    ]},
  {id:"part8",title:"Part 8",subtitle:"整體感受",icon:"✨",
    description:"最後，用你的直覺評價整體體驗。",
    sections:[
      {title:"8.1　好看嗎",scale:"like",items:[
        {id:"8.1.1",text:"整體氛圍"},
        {id:"8.1.2",text:"文字配色可讀性"},
        {id:"8.1.3",text:"動畫效果"},
        {id:"8.1.4",text:"美術風格"},
        {id:"8.1.5",text:"圖示設計"},
      ]},
      {title:"8.2　順暢嗎",scale:"speed",items:[
        {id:"8.2.1",text:"開站速度"},
        {id:"8.2.2",text:"推進動畫流暢"},
        {id:"8.2.3",text:"畫面切換流暢"},
        {id:"8.2.4",text:"手機順暢度"},
        {id:"8.2.5",text:"表單無延遲"},
      ]},
      {title:"8.3　好用嗎",scale:"easy",items:[
        {id:"8.3.1",text:"知道該做什麼"},
        {id:"8.3.2",text:"步驟清楚"},
        {id:"8.3.3",text:"功能找得到"},
        {id:"8.3.4",text:"專有名詞懂"},
        {id:"8.3.5",text:"錯誤訊息懂"},
      ]},
    ]},
];

const SCALES={
  default:{labels:{ok:"✅ 順",weird:"😕 怪",confused:"❓ 不會用"},colors:{ok:"#5a8a3c",weird:"#c49000",confused:"#a05520"}},
  like:{labels:{ok:"😍 很好",weird:"🙂 還行",confused:"😕 怪怪的"},colors:{ok:"#5a8a3c",weird:"#b0953a",confused:"#a05520"}},
  speed:{labels:{ok:"⚡ 很順",weird:"🙂 普通",confused:"🐌 有點卡"},colors:{ok:"#5a8a3c",weird:"#b0953a",confused:"#a05520"}},
  easy:{labels:{ok:"👍 很直覺",weird:"🙂 還 OK",confused:"😕 卡住"},colors:{ok:"#5a8a3c",weird:"#b0953a",confused:"#a05520"}},
};

const TOTAL=PARTS.reduce((t,p)=>t+p.sections.reduce((s,sec)=>s+sec.items.length,0),0);

// ═══════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════
let state={view:PASSCODE?"gate":"welcome",user:null,answers:{},freeform:{},cur:PARTS[0].id,mobNav:false,saveStatus:""};
let saveTimer=null;

function setState(patch){Object.assign(state,patch);render();}

// ═══════════════════════════════════════════════
// Firebase helpers
// ═══════════════════════════════════════════════
function uid(){return state.user?`${state.user.nickname}-${state.user.device}-${state.user.browser}`.replace(/[.#$/\[\]]/g,'_'):null;}

function saveToFirebase(){
  const id=uid();if(!id)return;
  setState({saveStatus:"saving"});
  db.ref('feedback/'+id).set({...state.user,answers:state.answers,freeform:state.freeform,updatedAt:new Date().toISOString()})
    .then(()=>{setState({saveStatus:"saved"});setTimeout(()=>setState({saveStatus:""}),2000);})
    .catch(e=>{console.error(e);setState({saveStatus:""});});
}

function loadFromFirebase(cb){
  const id=uid();if(!id)return cb(null);
  db.ref('feedback/'+id).once('value').then(snap=>{cb(snap.val());}).catch(()=>cb(null));
}

function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(saveToFirebase,1200);}

// ═══════════════════════════════════════════════
// SVG Ring
// ═══════════════════════════════════════════════
function ringSVG(progress,size=32,stroke=2.5){
  const r=(size-stroke)/2,c=2*Math.PI*r,off=c*(1-progress);
  return `<svg width="${size}" height="${size}" class="ring"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(0,0,0,.08)" stroke-width="${stroke}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#6B8E4E" stroke-width="${stroke}" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset .4s"/></svg>`;
}

// ═══════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  if(state.view==='gate') return renderGate(app);
  if(state.view==='welcome') return renderWelcome(app);
  renderForm(app);
}

function renderGate(el){
  el.innerHTML=`<div class="gate-wrap"><div class="gate-card">
    <div class="icon">🔒</div>
    <h1 class="serif">方壺山道場</h1>
    <p class="sub">請輸入通行碼以開始測試</p>
    <input class="gate-input" id="pc-input" type="password" placeholder="請輸入通行碼" autofocus>
    <div id="pc-error"></div>
    <button class="btn-primary" id="pc-btn">進入 →</button>
    <p class="hint">通行碼由管理員提供</p>
  </div></div>`;
  const inp=document.getElementById('pc-input'),btn=document.getElementById('pc-btn'),err=document.getElementById('pc-error');
  btn.onclick=()=>{
    if(inp.value.trim()===PASSCODE){setState({view:'welcome'});}
    else{inp.classList.add('error');err.innerHTML='<p class="gate-err">通行碼錯誤，請確認後重試</p>';}
  };
  inp.onkeydown=e=>{if(e.key==='Enter')btn.click();};
  inp.oninput=()=>{inp.classList.remove('error');err.innerHTML='';};
}

function renderWelcome(el){
  el.innerHTML=`<div class="gate-wrap"><div class="welcome-card">
    <div style="text-align:center;margin-bottom:28px"><div style="font-size:40px;margin-bottom:8px">🏔️</div><h1 class="serif" style="font-size:24px;color:#5B3A1F">方壺山道場</h1><p style="margin:6px 0 0;font-size:14px;color:#9a8a6e">網站測試回饋系統</p></div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div><label class="field-label">暱稱 <span style="color:#c49000">*</span></label><input class="field-input" id="w-nick" placeholder="隨意填"></div>
      <div><label class="field-label">使用裝置</label><div class="chip-group" id="w-device"></div></div>
      <div><label class="field-label">瀏覽器</label><div class="chip-group" id="w-browser"></div></div>
      <div><label class="field-label">你的身份</label><div class="chip-group" id="w-role"></div></div>
    </div>
    <button class="btn-primary" id="w-start" disabled>開始填寫 →</button>
    <p class="hint">預計 40–60 分鐘，可分次完成</p>
  </div></div>`;
  let device='',browser='',role='';
  const nick=document.getElementById('w-nick'),startBtn=document.getElementById('w-start');
  function makeChips(containerId,items,getter,setter){
    const c=document.getElementById(containerId);
    c.innerHTML=items.map(i=>`<button class="chip" data-v="${i}">${i}</button>`).join('');
    c.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{
      setter(b.dataset.v);c.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x.dataset.v===getter()));
    });
  }
  makeChips('w-device',['電腦','手機','平板'],()=>device,v=>{device=v;});
  makeChips('w-browser',['Chrome','Safari','Firefox','Edge','其他'],()=>browser,v=>{browser=v;});
  makeChips('w-role',['朋友','測試人員','專案相關方','其他'],()=>role,v=>{role=v;});
  nick.oninput=()=>{startBtn.disabled=!nick.value.trim();};
  startBtn.onclick=()=>{
    state.user={nickname:nick.value.trim(),device,browser,role};
    loadFromFirebase(data=>{
      if(data){state.answers=data.answers||{};state.freeform=data.freeform||{};}
      setState({view:'form'});
    });
  };
}

function renderForm(el){
  const totalDone=Object.values(state.answers).filter(a=>a&&a.status).length;
  const pct=Math.round(totalDone/TOTAL*100);
  const allIds=[...PARTS.map(p=>p.id),'freeform'];

  // Build sidebar HTML
  let sidebarHTML='';
  PARTS.forEach(p=>{
    const total=p.sections.reduce((t,s)=>t+s.items.length,0);
    const done=p.sections.reduce((t,s)=>t+s.items.filter(i=>state.answers[i.id]&&state.answers[i.id].status).length,0);
    const active=state.cur===p.id;
    sidebarHTML+=`<button class="sidebar-btn ${active?'active':''}" data-part="${p.id}">
      ${ringSVG(total>0?done/total:0)}
      <div style="flex:1"><div class="label">${p.icon} ${p.subtitle}</div><div class="count">${done}/${total}</div></div>
    </button>`;
  });
  const fd=state.freeform?Object.values(state.freeform).filter(v=>v&&v.length>0).length:0;
  sidebarHTML+=`<button class="sidebar-btn ${state.cur==='freeform'?'active':''}" data-part="freeform">
    <span style="font-size:20px;width:32px;text-align:center">💬</span>
    <div><div class="label">自由回饋</div><div class="count">${fd}/4</div></div>
  </button>`;

  // Main content
  let mainHTML='';
  if(state.cur==='freeform'){
    mainHTML=renderFreeformHTML();
  }else{
    const part=PARTS.find(p=>p.id===state.cur);
    if(part) mainHTML=renderPartHTML(part);
  }

  const curIdx=allIds.indexOf(state.cur);
  const prevBtn=curIdx>0?`<button class="btn-prev" id="nav-prev">← 上一段</button>`:'<div></div>';
  const nextBtn=state.cur!=='freeform'
    ?`<button class="btn-next" id="nav-next">下一段 →</button>`
    :`<button class="btn-submit" id="nav-submit">🙏 完成送出</button>`;

  el.innerHTML=`
    <div class="topbar">
      <button class="mobile-toggle" id="mob-toggle">☰</button>
      <span class="logo">🏔️</span><span class="title serif">方壺山道場 測試回饋</span><div class="spacer"></div>
      <div style="display:flex;align-items:center;gap:8px">
        ${state.saveStatus==='saving'?'<span class="save-indicator" style="color:#c49000">儲存中...</span>':''}
        ${state.saveStatus==='saved'?'<span class="save-indicator" style="color:#6B8E4E">✓ 已儲存</span>':''}
        <div class="progress-badge" style="background:${pct>=100?'#6B8E4E':'rgba(139,90,43,.12)'};color:${pct>=100?'#fff':'#8B5A2B'}">${totalDone}/${TOTAL}　${pct}%</div>
      </div>
    </div>
    <div class="layout">
      <div class="sidebar">${sidebarHTML}</div>
      <div class="mobile-overlay" id="mob-overlay"><div class="mobile-nav">${sidebarHTML}</div></div>
      <div class="main" id="main-content">${mainHTML}
        <div class="nav-bottom">${prevBtn}${nextBtn}</div>
      </div>
    </div>`;

  // Event listeners
  document.querySelectorAll('.sidebar-btn,[data-part]').forEach(b=>b.onclick=()=>{
    setState({cur:b.dataset.part,mobNav:false});
    document.getElementById('main-content')?.scrollTo({top:0,behavior:'smooth'});
  });
  document.getElementById('mob-toggle')?.addEventListener('click',()=>{
    document.getElementById('mob-overlay').classList.toggle('open');
  });
  document.getElementById('mob-overlay')?.addEventListener('click',e=>{
    if(e.target.id==='mob-overlay') e.target.classList.remove('open');
  });
  document.getElementById('nav-prev')?.addEventListener('click',()=>{
    const i=allIds.indexOf(state.cur);if(i>0){setState({cur:allIds[i-1]});document.getElementById('main-content')?.scrollTo({top:0});}
  });
  document.getElementById('nav-next')?.addEventListener('click',()=>{
    const i=allIds.indexOf(state.cur);if(i<allIds.length-1){setState({cur:allIds[i+1]});document.getElementById('main-content')?.scrollTo({top:0});}
  });
  document.getElementById('nav-submit')?.addEventListener('click',saveToFirebase);

  // Status chip listeners
  document.querySelectorAll('[data-item-id]').forEach(chip=>{
    chip.onclick=()=>{
      const id=chip.dataset.itemId,val=chip.dataset.val;
      const cur=state.answers[id]||{};
      state.answers[id]={...cur,status:cur.status===val?null:val};
      scheduleSave();render();
    };
  });

  // Comment toggles
  document.querySelectorAll('.comment-toggle').forEach(btn=>{
    btn.onclick=()=>{
      const box=btn.parentElement.querySelector('.comment-wrap');
      if(box) box.style.display=box.style.display==='none'?'block':'none';
    };
  });

  // Comment inputs
  document.querySelectorAll('.comment-input').forEach(ta=>{
    ta.oninput=()=>{
      const id=ta.dataset.itemId;
      const cur=state.answers[id]||{};
      state.answers[id]={...cur,comment:ta.value};
      scheduleSave();
    };
  });

  // Freeform inputs
  document.querySelectorAll('.freeform-input').forEach(ta=>{
    ta.oninput=()=>{
      state.freeform[ta.dataset.key]=ta.value;
      scheduleSave();
    };
  });
}

function renderPartHTML(part){
  let html=`<div class="part-header">
    <div class="part-title"><span class="icon">${part.icon}</span><h2 class="serif">${part.title}　${part.subtitle}</h2></div>
    ${part.description?`<div class="part-desc">${part.description}</div>`:''}
  </div>`;
  part.sections.forEach(sec=>{
    html+=`<div style="margin-bottom:28px">
      <h3 class="section-title">${sec.title}</h3>
      ${sec.note?`<p class="section-note">${sec.note}</p>`:''}`;
    sec.items.forEach(item=>{
      const ans=state.answers[item.id]||{};
      const scale=SCALES[sec.scale||'default'];
      const cls=ans.status==='weird'?'weird':ans.status==='confused'?'confused':'';
      const hc=ans.comment&&ans.comment.length>0;
      let chipsHTML='';
      ['ok','weird','confused'].forEach(v=>{
        const active=ans.status===v;
        const c=scale.colors[v];
        chipsHTML+=`<button class="status-chip" data-item-id="${item.id}" data-val="${v}" style="border-color:${c};background:${active?c:'transparent'};color:${active?'#fff':c};opacity:${ans.status&&!active?'0.45':'1'}">${scale.labels[v]}</button>`;
      });
      html+=`<div class="item ${cls}">
        <div class="item-row">
          <span class="item-id">${item.id}</span>
          <div class="item-text">${item.text}</div>
          <div class="status-chips">${chipsHTML}</div>
        </div>
        <button class="comment-toggle ${hc?'has':''}">${hc?'▾ 已留言':'▸ 想說的話...'}</button>
        <div class="comment-wrap" style="display:${hc?'block':'none'}">
          <textarea class="comment-box comment-input" data-item-id="${item.id}" placeholder="有什麼想說的？">${ans.comment||''}</textarea>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  return html;
}

function renderFreeformHTML(){
  const fs=[{key:'best',title:'💚 最喜歡的地方',ph:'哪一個功能或體驗印象最好？'},{key:'improve',title:'💡 最想改善的地方',ph:'哪裡卡卡的？'},{key:'bugs',title:'🐛 遇到的問題',ph:'按了沒反應、畫面跑掉……有遇到才填'},{key:'other',title:'💬 其他想說的話',ph:'任何想法都歡迎'}];
  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px"><span style="font-size:28px">💬</span><h2 class="serif" style="font-size:20px;color:#5B3A1F">自由回饋</h2></div>
    <p style="color:#6b5830;font-size:13.5px;margin-bottom:20px">這是最後一段，你的心聲最重要。</p>`;
  fs.forEach(f=>{
    html+=`<div style="margin-bottom:24px">
      <h3 class="section-title">${f.title}</h3>
      <textarea class="freeform-area freeform-input" data-key="${f.key}" placeholder="${f.ph}">${state.freeform[f.key]||''}</textarea>
    </div>`;
  });
  return html;
}

// ═══════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════
render();
</script>
</body>
</html>
